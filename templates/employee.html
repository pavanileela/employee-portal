<!DOCTYPE html>
<html>
<head>
    <title>Employee Details</title>
</head>
<body>

<h1>Welcome {{ username }}</h1>

<h2>Employee Details</h2>

<table border="1">

<tr>
    <th>Field</th>
    <th>Value</th>
</tr>

{% for key, value in details.items() %}

<tr>
    <td>{{ key }}</td>
    <td>{{ value }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
